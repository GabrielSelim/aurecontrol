[databases]
; Todas as conexoes roteadas para o banco real
; Pool explicito por usuario garante controle fino de conexoes
postgres = host=db port=5432 dbname=postgres

[pgbouncer]
listen_port = 6432
listen_addr = *

; Autenticacao: md5 (compativel com todos os servicos Supabase)
auth_type = md5
auth_file = /tmp/pgbouncer-userlist.txt

; ── TRANSACTION mode ─────────────────────────────────────────────────────────
; Cada transacao libera a conexao ao pool imediatamente.
; Muito mais eficiente que session mode para workloads web REST.
;
; SERVICOS QUE PASSAM PELO PGBOUNCER (transaction mode):
;   - Storage API (pg/node-postgres: sem prepared statements por padrao)
;   - pg-meta       (Node.js pg: compativel)
;   - Edge Functions (Deno: compativel)
;
; SERVICOS QUE CONECTAM DIRETAMENTE AO DB (bypassam PgBouncer):
;   - GoTrue   → db:5432 pool=5  (usa pgx com prepared statements – INCOMPATIVEL)
;   - PostgREST → db:5432 pool=5 (usa libpq + LISTEN/NOTIFY – INCOMPATIVEL)
;   - Realtime  → db:5432 pool=3 (usa LISTEN/NOTIFY + SET search_path – INCOMPATIVEL)
pool_mode = transaction

; ── Tamanho do pool ──────────────────────────────────────────────────────────
; Conexoes REAIS ao PostgreSQL por (user, db)
default_pool_size = 15

; Conexoes minimas mantidas abertas (warmup)
min_pool_size = 2

; Conexoes extras de reserva para picos
reserve_pool_size = 5
reserve_pool_timeout = 3

; Hard cap: nunca mais que 80 conexoes reais ao banco no total
max_db_connections = 80

; Maximo de clientes simultaneos conectados ao PgBouncer
max_client_conn = 500

; ── Timeouts de servidor ─────────────────────────────────────────────────────
; Fecha conexao ociosa ao banco apos 30s (era 600s = 10min!)
server_idle_timeout = 30

; Recicla conexao ao banco apos 1h (evita conexoes petrificadas)
server_lifetime = 3600

; Timeout de conexao ao servidor
server_connect_timeout = 15

; Reset da sessao ao devolver conexao ao pool em transaction mode
server_reset_query = DISCARD ALL

; ── Timeouts de cliente ──────────────────────────────────────────────────────
; Desconecta cliente inativo apos 5 min (libera slot de conexao)
client_idle_timeout = 300

; Timeout de login
client_login_timeout = 60

; ── Startup parameters ignorados ─────────────────────────────────────────────
; Parametros que causam incompatibilidade em alguns drivers
ignore_startup_parameters = extra_float_digits,options,search_path,client_encoding,application_name

; ── Logging ──────────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; ── Admin ─────────────────────────────────────────────────────────────────────
admin_users = postgres
stats_users = postgres
