[databases]
; Roteia todas as conexões de "postgres" para o banco real
postgres = host=db port=5432 dbname=postgres

[pgbouncer]
listen_port = 6432
listen_addr = *

; Autenticação: md5 (compatível com todos os serviços Supabase)
auth_type = md5
auth_file = /tmp/pgbouncer-userlist.txt

; session mode: compatível com LISTEN/NOTIFY, prepared statements, SET, etc.
pool_mode = session

; Até 1000 clientes simultâneos conectados ao PgBouncer
max_client_conn = 1000

; 20 conexões reais no banco por usuário+database
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 5

; Fecha conexão ociosa ao banco após 10 min
server_idle_timeout = 600

; Parâmetros ignorados que causam erros em alguns drivers
ignore_startup_parameters = extra_float_digits,options

; Logs reduzidos para não poluir
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1

; Admin
admin_users = postgres
stats_users = postgres
